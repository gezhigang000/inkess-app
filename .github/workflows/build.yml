name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos-only
          - macos-intel-only
          - windows-only

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.platform }}" == "macos-only" ]]; then
            echo 'matrix={"include":[{"platform":"macos-latest","target":"aarch64-apple-darwin","label":"macOS-arm64"}]}' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "macos-intel-only" ]]; then
            echo 'matrix={"include":[{"platform":"macos-15-intel","target":"x86_64-apple-darwin","label":"macOS-x64"}]}' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "windows-only" ]]; then
            echo 'matrix={"include":[{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","label":"Windows-x64"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"platform":"macos-latest","target":"aarch64-apple-darwin","label":"macOS-arm64"},{"platform":"macos-15-intel","target":"x86_64-apple-darwin","label":"macOS-x64"},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","label":"Windows-x64"}]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (cross-platform)
        if: runner.os == 'Windows' || matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Install dependencies
        if: runner.os != 'Windows' && matrix.target != 'x86_64-apple-darwin'
        run: npm install

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Force dynamic CRT (/MD) for C/C++ deps on Windows to match ort-sys pre-built binaries
          CFLAGS: ${{ runner.os == 'Windows' && '/MD' || '' }}
          CXXFLAGS: ${{ runner.os == 'Windows' && '/MD' || '' }}
        with:
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}

      - name: Notarize macOS DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait
            xcrun stapler staple "$DMG"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Inkess-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  release:
    needs: build
    if: always() && !cancelled() && startsWith(github.ref, 'refs/tags/v') && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  upload-oss:
    needs: release
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install aliyun-cli
        run: |
          curl -sSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar xz
          sudo mv aliyun /usr/local/bin/
          aliyun configure set \
            --profile default \
            --mode AK \
            --region cn-beijing \
            --access-key-id "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            --access-key-secret "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

      - name: Upload to Aliyun OSS
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          BUCKET="oss://inkess-install-file"
          ENDPOINT="oss-cn-beijing.aliyuncs.com"

          # Upload macOS ARM64 DMG
          ARM_DMG=$(find artifacts/Inkess-macOS-arm64 -name "*.dmg" 2>/dev/null | head -1)
          if [ -n "$ARM_DMG" ]; then
            aliyun oss cp "$ARM_DMG" "${BUCKET}/Inkess-macOS-arm64.dmg" -e "$ENDPOINT" -f
            aliyun oss cp "$ARM_DMG" "${BUCKET}/${TAG}/Inkess-macOS-arm64.dmg" -e "$ENDPOINT" -f
            echo "Uploaded ARM64 DMG: $ARM_DMG"
          fi

          # Upload macOS Intel DMG
          INTEL_DMG=$(find artifacts/Inkess-macOS-x64 -name "*.dmg" 2>/dev/null | head -1)
          if [ -n "$INTEL_DMG" ]; then
            aliyun oss cp "$INTEL_DMG" "${BUCKET}/Inkess-macOS-x64.dmg" -e "$ENDPOINT" -f
            aliyun oss cp "$INTEL_DMG" "${BUCKET}/${TAG}/Inkess-macOS-x64.dmg" -e "$ENDPOINT" -f
            echo "Uploaded Intel DMG: $INTEL_DMG"
          fi

          # Upload Windows EXE (NSIS)
          WIN_EXE=$(find artifacts/Inkess-Windows-x64 -name "*.exe" 2>/dev/null | head -1)
          if [ -n "$WIN_EXE" ]; then
            aliyun oss cp "$WIN_EXE" "${BUCKET}/Inkess-Windows-x64.exe" -e "$ENDPOINT" -f
            aliyun oss cp "$WIN_EXE" "${BUCKET}/${TAG}/Inkess-Windows-x64.exe" -e "$ENDPOINT" -f
            echo "Uploaded Windows EXE: $WIN_EXE"
          fi

          echo "OSS upload complete. Files available at https://download.starapp.net/"

  update-homebrew:
    needs: upload-oss
    if: always() && needs.upload-oss.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION="${TAG#v}"
          OSS_BASE="https://download.starapp.net"

          # Download DMGs from OSS and compute SHA256
          ARM_SHA256=""
          INTEL_SHA256=""

          if curl -sSf -o /tmp/inkess-arm64.dmg "${OSS_BASE}/Inkess-macOS-arm64.dmg"; then
            ARM_SHA256=$(sha256sum /tmp/inkess-arm64.dmg | cut -d' ' -f1)
            echo "ARM64 SHA256: $ARM_SHA256"
          fi

          if curl -sSf -o /tmp/inkess-x64.dmg "${OSS_BASE}/Inkess-macOS-x64.dmg"; then
            INTEL_SHA256=$(sha256sum /tmp/inkess-x64.dmg | cut -d' ' -f1)
            echo "Intel SHA256: $INTEL_SHA256"
          fi

          if [ -z "$ARM_SHA256" ] && [ -z "$INTEL_SHA256" ]; then
            echo "No DMG found on OSS, skipping"
            exit 0
          fi

          # Clone homebrew tap
          git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/gezhigang000/homebrew-inkess.git" /tmp/homebrew-inkess
          cd /tmp/homebrew-inkess

          # Generate cask based on available architectures
          if [ -n "$ARM_SHA256" ] && [ -n "$INTEL_SHA256" ]; then
            # Both architectures available — multi-arch cask
            cat > Casks/inkess.rb <<CASK
          cask "inkess" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_SHA256}"
              url "${OSS_BASE}/Inkess-macOS-arm64.dmg"
            end

            on_intel do
              sha256 "${INTEL_SHA256}"
              url "${OSS_BASE}/Inkess-macOS-x64.dmg"
            end

            name "Inkess"
            desc "Markdown Reader & Editor with AI Assistant"
            homepage "https://github.com/gezhigang000/inkess-app"

            depends_on macos: ">= :big_sur"

            app "Inkess.app"

            zap trash: [
              "~/.local/share/inkess",
              "~/Library/Preferences/com.inkess.app.plist",
              "~/Library/Saved Application State/com.inkess.app.savedState",
            ]
          end
          CASK
          elif [ -n "$ARM_SHA256" ]; then
            # ARM64 only — fallback single-arch cask
            cat > Casks/inkess.rb <<CASK
          cask "inkess" do
            version "${VERSION}"
            sha256 "${ARM_SHA256}"

            url "${OSS_BASE}/Inkess-macOS-arm64.dmg"
            name "Inkess"
            desc "Markdown Reader & Editor with AI Assistant"
            homepage "https://github.com/gezhigang000/inkess-app"

            depends_on macos: ">= :big_sur"
            depends_on arch: :arm64

            app "Inkess.app"

            zap trash: [
              "~/.local/share/inkess",
              "~/Library/Preferences/com.inkess.app.plist",
              "~/Library/Saved Application State/com.inkess.app.savedState",
            ]
          end
          CASK
          else
            # Intel only — fallback single-arch cask
            cat > Casks/inkess.rb <<CASK
          cask "inkess" do
            version "${VERSION}"
            sha256 "${INTEL_SHA256}"

            url "${OSS_BASE}/Inkess-macOS-x64.dmg"
            name "Inkess"
            desc "Markdown Reader & Editor with AI Assistant"
            homepage "https://github.com/gezhigang000/inkess-app"

            depends_on macos: ">= :big_sur"
            depends_on arch: :intel

            app "Inkess.app"

            zap trash: [
              "~/.local/share/inkess",
              "~/Library/Preferences/com.inkess.app.plist",
              "~/Library/Saved Application State/com.inkess.app.savedState",
            ]
          end
          CASK
          fi
          sed -i 's/^          //' Casks/inkess.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update Inkess to ${TAG}"
          git push origin main
