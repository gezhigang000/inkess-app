name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# macOS (ARM64 + Intel) is built locally via scripts/build-local.sh
# GitHub Actions only builds Windows

jobs:
  build:
    runs-on: windows-latest
    name: Build (Windows-x64)
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CFLAGS: /MD
          CXXFLAGS: /MD
        with:
          tauriScript: npm run tauri
          args: --target x86_64-pc-windows-msvc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Inkess-Windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  upload-oss:
    needs: release
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install aliyun-cli
        run: |
          curl -sSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar xz
          sudo mv aliyun /usr/local/bin/
          aliyun configure set \
            --profile default \
            --mode AK \
            --region cn-beijing \
            --access-key-id "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            --access-key-secret "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

      - name: Upload Windows to Aliyun OSS
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          BUCKET="oss://inkess-install-file"
          ENDPOINT="oss-cn-beijing.aliyuncs.com"

          # Upload Windows EXE (NSIS)
          WIN_EXE=$(find artifacts/Inkess-Windows-x64 -name "*.exe" 2>/dev/null | head -1)
          if [ -n "$WIN_EXE" ]; then
            aliyun oss cp "$WIN_EXE" "${BUCKET}/Inkess-Windows-x64.exe" -e "$ENDPOINT" -f
            aliyun oss cp "$WIN_EXE" "${BUCKET}/${TAG}/Inkess-Windows-x64.exe" -e "$ENDPOINT" -f
            echo "Uploaded Windows EXE: $WIN_EXE"
          fi

          echo "OSS upload complete. Files available at https://download.starapp.net/"

  update-homebrew:
    needs: upload-oss
    if: always() && needs.upload-oss.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION="${TAG#v}"
          OSS_BASE="https://download.starapp.net"

          # Download DMGs from OSS (uploaded by build-local.sh) and compute SHA256
          ARM_SHA256=""
          INTEL_SHA256=""

          if curl -sSf -o /tmp/inkess-arm64.dmg "${OSS_BASE}/Inkess-macOS-arm64.dmg"; then
            ARM_SHA256=$(sha256sum /tmp/inkess-arm64.dmg | cut -d' ' -f1)
            echo "ARM64 SHA256: $ARM_SHA256"
          fi

          if curl -sSf -o /tmp/inkess-x64.dmg "${OSS_BASE}/Inkess-macOS-x64.dmg"; then
            INTEL_SHA256=$(sha256sum /tmp/inkess-x64.dmg | cut -d' ' -f1)
            echo "Intel SHA256: $INTEL_SHA256"
          fi

          if [ -z "$ARM_SHA256" ] && [ -z "$INTEL_SHA256" ]; then
            echo "No DMG found on OSS, skipping"
            exit 0
          fi

          # Clone homebrew tap
          git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/gezhigang000/homebrew-inkess.git" /tmp/homebrew-inkess
          cd /tmp/homebrew-inkess

          # Generate cask based on available architectures
          if [ -n "$ARM_SHA256" ] && [ -n "$INTEL_SHA256" ]; then
            cat > Casks/inkess.rb <<CASK
          cask "inkess" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_SHA256}"
              url "${OSS_BASE}/Inkess-macOS-arm64.dmg"
            end

            on_intel do
              sha256 "${INTEL_SHA256}"
              url "${OSS_BASE}/Inkess-macOS-x64.dmg"
            end

            name "Inkess"
            desc "Markdown Reader & Editor with AI Assistant"
            homepage "https://github.com/gezhigang000/inkess-app"

            depends_on macos: ">= :big_sur"

            app "Inkess.app"

            zap trash: [
              "~/Library/Application Support/inkess",
              "~/Library/Preferences/com.inkess.app.plist",
              "~/Library/Saved Application State/com.inkess.app.savedState",
            ]
          end
          CASK
          elif [ -n "$ARM_SHA256" ]; then
            cat > Casks/inkess.rb <<CASK
          cask "inkess" do
            version "${VERSION}"
            sha256 "${ARM_SHA256}"

            url "${OSS_BASE}/Inkess-macOS-arm64.dmg"
            name "Inkess"
            desc "Markdown Reader & Editor with AI Assistant"
            homepage "https://github.com/gezhigang000/inkess-app"

            depends_on macos: ">= :big_sur"
            depends_on arch: :arm64

            app "Inkess.app"

            zap trash: [
              "~/Library/Application Support/inkess",
              "~/Library/Preferences/com.inkess.app.plist",
              "~/Library/Saved Application State/com.inkess.app.savedState",
            ]
          end
          CASK
          else
            cat > Casks/inkess.rb <<CASK
          cask "inkess" do
            version "${VERSION}"
            sha256 "${INTEL_SHA256}"

            url "${OSS_BASE}/Inkess-macOS-x64.dmg"
            name "Inkess"
            desc "Markdown Reader & Editor with AI Assistant"
            homepage "https://github.com/gezhigang000/inkess-app"

            depends_on macos: ">= :big_sur"
            depends_on arch: :intel

            app "Inkess.app"

            zap trash: [
              "~/Library/Application Support/inkess",
              "~/Library/Preferences/com.inkess.app.plist",
              "~/Library/Saved Application State/com.inkess.app.savedState",
            ]
          end
          CASK
          fi
          sed -i 's/^          //' Casks/inkess.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update Inkess to ${TAG}"
          git push origin main
